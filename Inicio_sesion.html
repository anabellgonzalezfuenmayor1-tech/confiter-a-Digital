<!DOCTYPE html>
<html lang="en">

<head>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,400&display=swap"

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap"

<body>

            <input type="text" placeholder="Nombre usuario" class="input-inicio input-usuario">

            <button class="btn-inicio">Inicio sesion</button>

                <a href="" class="link-p">¿Olvidaste tu contraseña?</a>

            <div class="heart-group">
                <hr class="line-inicio">
                <img src="Imagenes/heart orange.svg" alt="" class="heart-orange">
                <hr class="line-inicio">
            </div>
            <div class="group-certicate">
                <img src="Imagenes/Secure.svg" alt="" class="secure-img">
