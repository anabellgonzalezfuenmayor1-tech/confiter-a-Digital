<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,400&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap"

    <title>Confiteria digital ADSO</title>
</head>

<body>
    <section>
        <form action="" class="form-inicio">
            <img src="Imagenes/Logo.svg" alt="" class="logo-inicio">
            <p class="title-inicio">Confiteria Digital</p>
            <input type="text" placeholder="Nombre(s)" class="input-inicio input-credenciales">
            <input type="password" placeholder="Apellidos Completos" class="input-inicio input-credenciales">
            <input type="text" placeholder="Correo" class="input-inicio input-email">
            <div class="container-genero">
                <div class="container-s">
                    <div class="circle-s"></div>
                    <p>Femenino</p>
                </div>
                <div class="container-s">
                    <div class="circle-s"></div>
                    <p>Masculino</p>
                </div>
                <div class="container-s">
                    <div class="circle-s"></div>
                    <p>Prefiero no decirlo</p>
                </div>
            </div>
            <button class="btn-crear">Crear Cuenta</button>
            <div class="group-text">
                <p class="link-p">¿Ya tienes cuenta?</p>
                <a href="Inicio_sesion.html" class="link-p naranja">Inicia sesion</a>
            </div>
        </form>
    </section>
